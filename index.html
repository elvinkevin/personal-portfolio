<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>portifolio website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .bg-custom-indigo {
            background-color: #030216 !important;
            color: white;
        }

        .text-custom-indigo {
            color: #353392 !important;
        }

        @media (max-width: 768px) {

            /* Give the hero text more space from the buttons */
            .lead {
                margin-bottom: 2rem !important;
            }

            /* Stack buttons vertically if they are too wide, or add space below them */
            .d-flex.gap-4 {
                flex-direction: row;
                /* Keep them side-by-side but smaller */
                justify-content: center;
                gap: 1rem !important;
                margin-bottom: 3rem;
                /* Pushes the image down */
            }

            /* Adjust the profile circle size for mobile so it doesn't swallow the screen */
            .profile-circle {
                width: 220px !important;
                height: 220px !important;
                margin-top: 20px;
            }
        }

        .profile-circle {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 5px solid rgba(255, 255, 255, 0.1);
        }

        .profile-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transition: transform 0.3s ease-in-out;
            box-shadow: 0 0 0 0 rgba(77, 174, 0, 0.4);
            /* Your green color */
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(77, 174, 0, 0.7);
            }

            70% {
                transform: scale(1.02);
                box-shadow: 0 0 0 15px rgba(77, 174, 0, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(77, 174, 0, 0);
            }
        }

        .text-gradient {

            background: linear-gradient(90deg, #41840b 0%, #3331a1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            display: inline-block;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-hero {
            animation: fadeInUp 1s ease-out forwards;
        }

        .btn-hover-effect {
            transition: all 0.3s ease;
        }

        .btn-hover-effect:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            filter: brightness(1.1);
        }

        .typed-cursor {
            color: #4DAE00;
            font-weight: bold;
        }

        .typing-text {
            color: #4DAE00;
            font-weight: 600;
        }

        body {
            background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)),
                url('images/tech-image.avif');
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-color: #1e1b4b;
            color: white;
            /* Make all text white by default */
            margin: 0;
            padding: 0;
        }

        .btn-primary-gradient {
            background: linear-gradient(135deg, #4DAE00 0%, #2e6900 100%) !important;
            border: none !important;
            color: white !important;
            box-shadow: 0 4px 15px rgba(77, 174, 0, 0.4);
            transition: all 0.3s ease;
        }

        /* 2. The Portfolio Proof: Subtle Indigo-Green Gradient */
        .btn-secondary-gradient {
            background: linear-gradient(135deg, rgba(77, 174, 0, 0.2) 0%, rgba(53, 51, 146, 0.2) 100%) !important;
            border: 1px solid #4DAE00 !important;
            color: white !important;
            backdrop-filter: blur(5px);
            /* Modern "Glass" effect */
            transition: all 0.3s ease;
        }

        /* Hover States for "Taste" */
        .btn-primary-gradient:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(77, 174, 0, 0.6);
            filter: brightness(1.1);
        }

        .btn-secondary-gradient:hover {
            background: linear-gradient(135deg, #4DAE00 0%, #353392 100%) !important;
            transform: translateY(-3px);
            border-color: transparent !important;
        }

        .navbar-nav .nav-link {
            color: rgba(255, 255, 255, 0.7) !important;
            transition: color 0.3s ease;
        }

        .navbar-nav .nav-link:hover,
        .navbar-nav .nav-link.active {
            color: #4DAE00 !important;
            /* Your brand green */
        }

        /* Add a subtle underline to the active link */
        .navbar-nav .nav-link.active {
            border-bottom: 2px solid #4DAE00;
        }

        .navbar .btn-outline-success {
            color: #4DAE00;
            border-color: rgba(77, 174, 0, 0.5);
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .navbar .btn-outline-success:hover {
            background-color: #4DAE00;
            color: white;
            border-color: #4DAE00;
            box-shadow: 0 0 10px rgba(77, 174, 0, 0.3);
        }
    </style>

</head>

<body id="homepage" class="bg-custom-indigo">
    <nav class="navbar navbar-expand-lg bg-gradient sticky-top bg-opacity-55 navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold text-light" href="#homepage" aria-label="Go to homepage">portifolio</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>

            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav me-3 gap-lg-4 gap-md-2">
                    <li class="nav-item">
                        <a class="nav-link active" href="#homepage" aria-label="Go to homepage">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#aboutus" aria-label="Go to about me">About Me</a>

                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#work" aria-label="Go to work">My Work</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#contactus" aria-label="Go to contact us">Get in Touch</a>
                    </li>
                </ul>
            </div>
            <div class="d-flex gap-2 align-items-end">
                <a href="Kevin_Axel_CV.pdf"
                    class="btn btn-secondary-gradient btn-sm rounded-pill px-3 py-2 px-4 d-none d-sm-inline-block"
                    download>
                    <i class="bi bi-download me-1"></i> CV
                </a>

            </div>
        </div>

    </nav>
    </header>
    <hero class="animate-hero">
        <section class="hero-network-bg text-white py-5 d-flex align-items-center">
            <div class="container">
                <div class="col-lg-6">
                </div>
                <div class="col-lg-6">
                </div>
            </div>
        </section>
        <section class="py-3 text-white">
            <div class="container">
                <div class="row align-items-center flex-column-reverse flex-lg-row">

                    <div class="col-lg-6 text-center text-lg-start">
                        <h1 class="display-3 fw-bold">
                            <span style="color: aliceblue;">Hi,</span>
                            <span class="text-gradient">I'm Kevin Axel</span>
                        </h1>

                        <p class="lead">
                            I am a full-stack software developer, information security analyst and SEO
                            engineer with a strong passion for technology and innovation.
                            <span class="typing-text"></span>
                        </p>

                        g<div
                            class="mt-4 d-flex flex-row justify-content-center justify-content-lg-start gap-2 gap-sm-3">
                            <a href="#contact"
                                class="btn btn-primary-gradient btn-md rounded-pill px-3 px-sm-4 px-md-4 px-lg-6 py-3 fw-bold flex-grow-1 flex-sm-grow-0">
                                Hire Me
                            </a>

                           
                        </div>
                    </div>

                    <div class="col-lg-6 mb-5 mb-lg-0">
                        <div class="profile-circle mx-auto">
                            <img src="images/image1.jpeg" alt="Kevin Axel">
                        </div>
                    </div>

                </div>
            </div>
        </section>
    </hero>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <script>
        var typed = new Typed('.typing-text', {
            strings: [
                ' Let\'s build something secure.',
                ' Ready to optimize your performance.',
                ' Protecting your digital assets.'
            ],
            typeSpeed: 40,
            backSpeed: 20,
            backDelay: 2000, // Waits 2 seconds before deleting
            loop: true,
            cursorChar: '|',
            contentType: 'html'
        });
    </script>
</body>

</html>
